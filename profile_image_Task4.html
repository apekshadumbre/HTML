<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f0f0f0;
      font-family: Arial, sans-serif;
    }

    .card {
      background: white;
      width: 280px;
      padding: 20px;
      text-align: center;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.2); /* shadow */
    }

    .card img {
      width: 120px;
      height: 120px;
      border-radius: 50%; /* circular image */
      object-fit: cover;
      margin-bottom: 15px;
    }

    .name {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .bio {
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>

  <div class="card">
    <img src="appu.jpg" alt="Profile Image">
    <div class="name">Apeksha Dumbre</div>
    <div class="bio">Web Developer | Software Engineer| Tech Enthusiast</div>
  </div>

</body>
</html>
