<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      margin-top: 50px;
    }

    table {
      border-collapse: collapse;
      width: 60%;
      text-align: center;
    }

    th, td {
      border: 1px solid #333;   /* border */
      padding: 10px;
    }

    th {
      background-color: #333;
      color: white;
    }

    /* Zebra stripes */
    tr:nth-child(even) {
      background-color: #f2f2f2;
    }

    /* Hover effect */
    tr:hover {
      background-color: #ddd;
    }
  </style>
</head>
<body>

  <table>
    <tr>
      <th>Student Name</th>
      <th>Roll No</th>
      <th>Marks</th>
    </tr>
    <tr>
      <td>Amit</td>
      <td>101</td>
      <td>85</td>
    </tr>
    <tr>
      <td>Priya</td>
      <td>102</td>
      <td>90</td>
    </tr>
    <tr>
      <td>Rahul</td>
      <td>103</td>
      <td>78</td>
    </tr>
    <tr>
      <td>Sneha</td>
      <td>104</td>
      <td>92</td>
    </tr>
  </table>

</body>
</html>
