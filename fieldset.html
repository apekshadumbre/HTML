<!---- fieldset: element in html is used to group the forms elemts together
    the legend attribute is used to give the title to that group-->
    <html>
        <head></head>
        <body>
            <form>

            <h2>fieldset Elemets</h2>
            <fieldset>
                <legend>personal details</legend>
                <label for="fname">First name</label>
                <input type="text" name="fname" value="Rohini"><br>
                <label for="lname">Last name</label>
                <input type="text" name="lname" value="More"><br>
                
                </fieldset>


                <h2>select your country</h2>
                <fieldset>
                
                <input list="country" name="country">
                <datalist id="country">
                    <option value="India">
                        <option value="USA">
                            <option value="UK">
                                <option value="Australia">
                                    <option value="Canada">
                </datalist>
                  </fieldset>
                <br><br>
             <input type="submit" value="submit">
            </form>
        </body>
    </html>
