<html>
    <head><h1>Registration form</h1>

        <style>
            
            form{
                background-color: rgb(161, 173, 173);
                margin-left: auto;
                margin-right: 50;
            }
        </style>
    </head><br><br><br>
    <body>
      
        <form>
            <label for="fname" >first-name:</t></t><br>
            <input type="text" name="fname" placeholder="Enter first name" required><br><br>

            <label for="lname">last-name:</label></t></t><br>
            <input type="text" name="lname" placeholder="Enter the last name" required><br><br>
            <label for="Email">Email:</label></t></t></t></t><br>
            <input type="email" name="Email" placeholder="Enter your Email" required><br><br>
            <label for="pass">password:</label><br>
            <input type="password" name="pwd" placeholder="Enter password" required><br><br>

            <label for="Gender"> <b>select Gender</b></label><br>
            <input type="radio" name="gender" value="male">
            <label for="male">male</label><br>
            
            
            <input type="radio" name="gender" value="female">
            <label for="female">female</label><br>

            <input type="radio" name="gender" value="other">
            <label for="other">other</label><br><br>

            <label for="Subjects"><b>subjects</b></label><br>

            <input type="checkbox" value="English">
            <label for="English">English</label><br>
            <input type="checkbox" value="java">
            <label for="java">java</label><br>

            <input type="checkbox" value="C">
            <label for="c-language">C</label><br>

            <input type="checkbox" value="python">
            <label for="python">python</label><br>

            <input type="checkbox" value="spring">
            <label for="spring">springboot</label><br><br><br>
            
            <input type="Submit" value="submit">


        </form>
        </body>
</html>
