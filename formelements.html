<!DOCTYPE html>
<meta charset="UTF-8">
    <head>
    <style>
        body{
            font-family: Cambria,'Times New Roman', serif;
            background-color: bisque;
            
            
        }
        .form_data
        {
            width: 300px;
            margin: 50px,auto;
            margin-left: 300px;
            background-color:whitesmoke;
            padding: 20px;
            border-radius: 10px;
            background-image:url(formimage.jpg) ;
            font-size: medium;
            text-align: justify;
        }

        h2
        {
            text-align:center;
            color: black;
        }

        input{
            width: auto;
            border-radius: 5px;
            padding: 5px;
        }

        input[type="reset"],
        input[type="button"]
        {
            color:cornflowerblue;
            border-radius:5px;
            cursor: pointer;
        }
        input[type="submit"]:hover
        {
            color: darkblue;
            border-radius:5px;
        }
        footer
        {
            text-align: right;
        }
    </style>
    </head>
    <body>
        <header>
        <h2>Sample form data</h2>
        </header>
        
<div class="form_data">
        <form>
           <input type="hidden" value="hiddendata">
            Name<br>
            <input type="text" name="fname"></t>  

            <br>
            Email<br>
            <input type="email" pattern="[a-zA-Z0-9._%+>?]+@.+\.com" title="Email must end with.com" required>
            
             <br>
            password<br>
            <input type="password" required>
           
             <br>

            Age <br>

            <input type="number"><br>

            Date<br>
            <input type="date"><br><br>

            phone<br>
            <input type="tel"><br>

            Gender<br>
            <input type="radio" name="gender" value="male">male<br>
            <input type="radio" name="gender" value="Female">Female<br>
            <input type="radio" name="gender" value="other">Other<br><br>

            Subjects<br>
            <input type="checkbox" name="sub" value="C">C<br>
            <input type="checkbox" name="sub" value="java">java<br>
            <input type="checkbox" name="sub" value="python">python<br><br>

            upload file<br>
            <input type="file" required><br><br>

            website<br>
            <input type="url"><br><br>

            <input type="button" value="Click">
            <input type="reset" value="Reset">
            <input type="submit">
          

            <audio>
                <source src="">
            </audio>
            
             <br><br>
            <footer>
                <p style="color: cadetblue;">Designed By-Apeksha Dumbre&#9996</p>
            </footer>


        </div>
        
        </form>
    </body>
</html>
